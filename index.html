<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Panel de Empleados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="contenedor-login">
        <div class="caja-login">
            <h2>Iniciar Sesión</h2>
            <br></br>
            <p>Introduce tus datos para entrar al sistema</p>
            <br></br>

            <form id="formulario-login">
                <div class="grupo-input">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="correo@ejemplo.com">
                </div>

                <div class="grupo-input">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="Mínimo 8 caracteres">
                </div>

                <p id="mensaje-error" class="error"></p>

                <button type="submit" id="btn-entrar">Entrar</button>
            </form>
        </div>
    </main>

 <script type="module" src="./src/js/auth.js"></script>
</body>
</html>
